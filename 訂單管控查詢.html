<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂單管控查詢</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#1e40af;--pri-l:#3b82f6;--pri-bg:#eff6ff;
  --ok:#16a34a;--ok-bg:#dcfce7;
  --err:#dc2626;--err-bg:#fee2e2;
  --warn:#d97706;--warn-bg:#fef3c7;
  --pur:#7c3aed;--pur-bg:#ede9fe;
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;
  --tx:#1e293b;--mu:#64748b
}
body{font-family:'Segoe UI','Microsoft JhengHei',Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 60%,#1e40af 100%)}
.login-box{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:400px;
  box-shadow:0 30px 60px rgba(0,0,0,.4);text-align:center}
.login-logo{font-size:2.5rem;margin-bottom:8px}
.login-box h2{font-size:1.4rem;font-weight:800;color:var(--pri);margin-bottom:4px}
.login-box p{color:var(--mu);font-size:.85rem;margin-bottom:32px}
.lf{margin-bottom:16px;text-align:left}
.lf label{display:block;font-size:.78rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.lf input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;font-family:inherit;transition:border-color .2s}
.lf input:focus{outline:none;border-color:var(--pri-l);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
#login-err{background:var(--err-bg);color:var(--err);border-radius:8px;padding:10px 14px;font-size:.85rem;font-weight:600;margin-bottom:16px;display:none}

/* APP */
#app-screen{display:none}
.topbar{background:var(--pri);color:#fff;height:58px;display:flex;align-items:center;
  justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 12px rgba(0,0,0,.25)}
.topbar-title{font-size:1.05rem;font-weight:800}
.topbar-right{display:flex;align-items:center;gap:10px}

/* FILTER BAR */
.filter-bar{background:#fff;border-bottom:1px solid var(--border);padding:14px 28px;
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;position:sticky;top:58px;z-index:100}
.filter-bar input[type=date],.filter-bar input[type=text]{
  padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;
  font-size:.875rem;transition:border-color .2s}
.filter-bar input:focus{outline:none;border-color:var(--pri-l)}
.filter-bar label{font-size:.8rem;color:var(--mu);font-weight:600;white-space:nowrap}
.filter-sep{color:var(--border);font-size:1.2rem}

/* MAIN */
.main{padding:24px 28px;max-width:1400px;margin:0 auto}

/* DASHBOARD CARDS */
.dash{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:28px}
.dcard{background:#fff;border-radius:14px;padding:20px;border:1px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.05);text-align:center}
.dcard .val{font-size:1.5rem;font-weight:800;margin-bottom:4px;line-height:1.2}
.dcard .lbl{font-size:.75rem;color:var(--mu);font-weight:600;line-height:1.4}
.dcard.c-blue .val{color:var(--pri)}
.dcard.c-green .val{color:var(--ok)}
.dcard.c-orange .val{color:var(--warn)}
.dcard.c-purple .val{color:var(--pur)}

/* TABLE */
.table-wrap{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.05)}
.table-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.table-hd-title{font-size:.95rem;font-weight:800;color:var(--tx)}
.tbl{width:100%;border-collapse:collapse;font-size:.85rem}
.tbl th{background:#f8fafc;padding:11px 14px;text-align:left;font-size:.75rem;font-weight:700;
  color:var(--mu);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);
  white-space:nowrap}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafafa}
.tbl-scroll{overflow-x:auto}

/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;white-space:nowrap}
.b1{background:#fef9c3;color:#854d0e}
.b2{background:#dbeafe;color:#1d4ed8}
.b3{background:#dcfce7;color:#15803d}
.b4{background:#ede9fe;color:#6d28d9}

/* BTNS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;
  border-radius:9px;font-size:.85rem;font-weight:700;cursor:pointer;border:2px solid transparent;
  font-family:inherit;transition:all .2s;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-pri{background:var(--pri);color:#fff;border-color:var(--pri)}
.btn-pri:hover:not(:disabled){background:#1e3a8a}
.btn-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.btn-ok:hover:not(:disabled){background:#15803d}
.btn-gh{background:#f1f5f9;color:var(--tx);border-color:#f1f5f9}
.btn-gh:hover:not(:disabled){background:#e2e8f0}
.btn-out{background:#fff;color:var(--pri);border-color:var(--pri)}
.btn-out:hover:not(:disabled){background:var(--pri-bg)}
.btn-sm{padding:6px 12px;font-size:.78rem}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:24px;display:none}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:780px;max-height:90vh;
  overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.modal-hd{padding:24px 28px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-hd h3{font-size:1.05rem;font-weight:800}
.modal-body{padding:24px 28px}
.info-group{margin-bottom:24px}
.info-group-title{font-size:.75rem;font-weight:700;color:var(--mu);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-grid.g3{grid-template-columns:1fr 1fr 1fr}
.info-item{display:flex;flex-direction:column;gap:4px}
.info-item .il{font-size:.73rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.4px}
.info-item .iv{font-size:.9rem;font-weight:600;color:var(--tx)}
.info-item .iv.empty{color:#cbd5e1}

/* TOAST */
#tc{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:360px}
.toast{padding:14px 18px;border-radius:12px;font-size:.875rem;font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,.15);animation:tin .3s ease}
@keyframes tin{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.t-ok{background:var(--ok-bg);color:var(--ok);border:1px solid #86efac}
.t-err{background:var(--err-bg);color:var(--err);border:1px solid #fca5a5}
.t-info{background:var(--pri-bg);color:var(--pri);border:1px solid #93c5fd}

/* SPINNER */
.sp{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty-state{padding:60px 20px;text-align:center;color:var(--mu)}
.empty-state .ei{font-size:2.5rem;margin-bottom:12px}
.empty-state p{font-size:.9rem}

@media(max-width:1100px){.dash{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){
  .dash{grid-template-columns:repeat(2,1fr)}
  .main,.filter-bar,.topbar{padding-left:16px;padding-right:16px}
  .info-grid,.info-grid.g3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">📊</div>
    <h2>訂單管控查詢</h2>
    <p>請輸入帳號與密碼以登入</p>
    <div id="login-err">帳號或密碼錯誤，請重試</div>
    <div class="lf"><label>帳號</label><input type="text" id="un" placeholder="帳號" autocomplete="username"></div>
    <div class="lf"><label>密碼</label><input type="password" id="pw" placeholder="密碼" autocomplete="current-password"></div>
    <button class="btn btn-pri" style="width:100%;margin-top:8px" onclick="doLogin()">登入</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-title">📊 訂單管控查詢</div>
    <div class="topbar-right">
      <span id="tb-user" style="opacity:.85;font-size:.85rem"></span>
      <button class="btn btn-sm btn-ok" onclick="exportExcel()">📥 匯出 Excel</button>
      <button class="btn btn-sm" onclick="doLogout()"
        style="color:#fff;background:rgba(255,255,255,.15);border:none;padding:6px 14px;border-radius:8px">登出</button>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">
    <label>ETD 區間</label>
    <input type="date" id="f-from" onchange="loadOrders()">
    <span class="filter-sep">—</span>
    <input type="date" id="f-to" onchange="loadOrders()">
    <label style="margin-left:8px">PO 搜尋</label>
    <input type="text" id="f-po" placeholder="模糊搜尋 PO 號碼..." style="width:200px" oninput="debounceLoad()">
    <button class="btn btn-gh btn-sm" onclick="clearFilter()">清除篩選</button>
    <span id="filter-count" style="font-size:.8rem;color:var(--mu)"></span>
  </div>

  <div class="main">
    <!-- DASHBOARD -->
    <div class="dash">
      <div class="dcard c-blue">
        <div class="val" id="kpi-total">—</div>
        <div class="lbl">累計訂單筆數</div>
      </div>
      <div class="dcard c-green">
        <div class="val" id="kpi-imported">—</div>
        <div class="lbl">已進口筆數</div>
      </div>
      <div class="dcard c-blue">
        <div class="val" id="kpi-amt">—</div>
        <div class="lbl">累計訂單金額<br>USD</div>
      </div>
      <div class="dcard c-green">
        <div class="val" id="kpi-iamt">—</div>
        <div class="lbl">已進口總金額<br>USD</div>
      </div>
      <div class="dcard c-orange">
        <div class="val" id="kpi-comm">—</div>
        <div class="lbl">累計佣金<br>NTD</div>
      </div>
      <div class="dcard c-purple">
        <div class="val" id="kpi-fee">—</div>
        <div class="lbl">累計進口費用<br>NTD</div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-hd">
        <div class="table-hd-title">訂單列表</div>
      </div>
      <div class="tbl-scroll">
        <table class="tbl">
          <thead>
            <tr>
              <th>PO 號碼</th>
              <th>ETD</th>
              <th>ETC 發票日期</th>
              <th>訂單金額 USD</th>
              <th>報關費 NTD</th>
              <th>ETA</th>
              <th>TL 付款日</th>
              <th>狀態</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbl-body">
            <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--mu)">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="modal" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-hd">
      <h3 id="modal-title">訂單詳情</h3>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="modal-badge"></span>
        <button class="btn btn-gh btn-sm" onclick="closeModal()">✕ 關閉</button>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="tc"></div>

<script>
const SURL='https://ppmytkolaqxtqcmztxxr.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwbXl0a29sYXF4dHFjbXp0eHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjA5OTAsImV4cCI6MjA5NTA5Njk5MH0.ERyqOCEBsD2rg6i49a7m5IHbxxQ1z7JvAQWqUfOYcto';
const db=supabase.createClient(SURL,SKEY);

const USERS={'Tl3167':'tl888$$$'};
let CU=null;
let allOrders=[];
let lt=null;

function g(id){return document.getElementById(id)}
function toast(msg,type='info'){
  const el=document.createElement('div');
  el.className=`toast t-${type}`;el.textContent=msg;
  g('tc').appendChild(el);setTimeout(()=>el.remove(),3500);
}
function fmtD(s){return s?s.replace(/-/g,'/'):'—'}
function fmtN(v,dec=2){return v!=null&&v!==''?Number(v).toLocaleString('zh-TW',{minimumFractionDigits:dec,maximumFractionDigits:dec}):'—'}
function fmtNI(v){return v!=null&&v!==''?Math.round(Number(v)).toLocaleString('zh-TW'):'—'}
function calcStage(o){
  if(o.tl_payment_date) return 4;
  if(o.eta) return 3;
  if(o.etc_invoice_date) return 2;
  return 1;
}

// ── AUTH ──
function doLogin(){
  const u=g('un').value.trim(),p=g('pw').value;
  if(USERS[u]&&USERS[u]===p){
    CU=u;sessionStorage.setItem('u',u);
    g('login-screen').style.display='none';
    g('app-screen').style.display='block';
    g('tb-user').textContent=u;
    g('login-err').style.display='none';
    loadOrders();
  } else {g('login-err').style.display='block';}
}
function doLogout(){sessionStorage.removeItem('u');location.reload();}
g('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// ── LOAD ──
async function loadOrders(){
  const from=g('f-from').value,to=g('f-to').value,po=g('f-po').value.trim();
  let q=db.from('orders').select('*').order('created_at',{ascending:false});
  if(from) q=q.gte('etd',from);
  if(to) q=q.lte('etd',to);
  if(po) q=q.ilike('po_number',`%${po}%`);
  const {data,error}=await q;
  if(error){toast('載入失敗：'+error.message,'err');return;}
  allOrders=data||[];
  renderDash();
  renderTable();
}
let ldTimer=null;
function debounceLoad(){clearTimeout(ldTimer);ldTimer=setTimeout(loadOrders,350);}
function clearFilter(){
  g('f-from').value='';g('f-to').value='';g('f-po').value='';loadOrders();
}

// ── DASHBOARD ──
function renderDash(){
  const total=allOrders.length;
  const imported=allOrders.filter(o=>calcStage(o)>=3).length;
  const amt=allOrders.reduce((s,o)=>s+(+o.amount_usd||0),0);
  const iamt=allOrders.filter(o=>calcStage(o)>=3).reduce((s,o)=>s+(+o.amount_usd||0),0);
  const comm=amt*30*0.03;
  const fee=allOrders.reduce((s,o)=>s+(+o.customs_fee||0)+(+o.trade_promotion_fee||0),0);
  g('kpi-total').textContent=total.toLocaleString();
  g('kpi-imported').textContent=imported.toLocaleString();
  g('kpi-amt').textContent=fmtN(amt,0);
  g('kpi-iamt').textContent=fmtN(iamt,0);
  g('kpi-comm').textContent=fmtNI(comm);
  g('kpi-fee').textContent=fmtNI(fee);
  g('filter-count').textContent=`共 ${total} 筆`;
}

// ── TABLE ──
const SL=['','已建立','已出貨','已進口','已結清'];
function renderTable(){
  const body=g('tbl-body');
  if(!allOrders.length){
    body.innerHTML='<tr><td colspan="9"><div class="empty-state"><div class="ei">📭</div><p>目前沒有符合條件的訂單</p></div></td></tr>';
    return;
  }
  body.innerHTML=allOrders.map(o=>{const st=calcStage(o);return`
    <tr>
      <td><strong>${o.po_number||'—'}</strong></td>
      <td>${fmtD(o.etd)}</td>
      <td>${fmtD(o.etc_invoice_date)}</td>
      <td>${o.amount_usd?'$'+fmtN(o.amount_usd):'—'}</td>
      <td>${o.customs_fee!=null?fmtNI(o.customs_fee):'—'}</td>
      <td>${fmtD(o.eta)}</td>
      <td>${fmtD(o.tl_payment_date)}</td>
      <td><span class="bdg b${st}">${SL[st]||''}</span></td>
      <td><button class="btn btn-out btn-sm" onclick="openDetail(${o.id})">詳情</button></td>
    </tr>`}).join('');
}

// ── MODAL ──
function openDetail(id){
  const o=allOrders.find(x=>x.id===+id);
  if(!o) return;
  const st=calcStage(o);
  g('modal-title').textContent=`PO：${o.po_number||'—'}`;
  g('modal-badge').innerHTML=`<span class="bdg b${st}">${SL[st]||''}</span>`;
  const dt=v=>`<span class="iv${!v?' empty':''}">${v?fmtD(v):'—'}</span>`;
  const nu=v=>`<span class="iv${(!v&&v!==0)?' empty':''}">${(v!=null&&v!=='')?fmtN(v):'—'}</span>`;
  const ni=v=>`<span class="iv${(!v&&v!==0)?' empty':''}">${(v!=null&&v!=='')?fmtNI(v):'—'}</span>`;
  g('modal-body').innerHTML=`
    <div class="info-group">
      <div class="info-group-title">訂單資料</div>
      <div class="info-grid">
        <div class="info-item"><span class="il">PO 號碼</span><span class="iv">${o.po_number||'—'}</span></div>
        <div class="info-item"><span class="il">ETD（預計出貨日）</span>${dt(o.etd)}</div>
        <div class="info-item"><span class="il">ETC 發票日期</span>${dt(o.etc_invoice_date)}</div>
        <div class="info-item"><span class="il">訂單金額（USD）</span>${nu(o.amount_usd)}</div>
      </div>
    </div>
    <div class="info-group">
      <div class="info-group-title">進口資料</div>
      <div class="info-grid">
        <div class="info-item"><span class="il">ETA（預計到港日）</span>${dt(o.eta)}</div>
        <div class="info-item"><span class="il">貨代清關日期</span>${dt(o.customs_agent_date)}</div>
        <div class="info-item"><span class="il">報關費（NTD）</span>${ni(o.customs_fee)}</div>
        <div class="info-item"><span class="il">推貿費（NTD）</span>${ni(o.trade_promotion_fee)}</div>
        <div class="info-item"><span class="il">客戶簽收日期</span>${dt(o.customer_signed_date)}</div>
        <div class="info-item"><span class="il">對帳單日期</span>${dt(o.monthly_statement_date)}</div>
        <div class="info-item"><span class="il">轉進貨單日期</span>${dt(o.transfer_receipt_date)}</div>
        <div class="info-item"><span class="il">入庫日期</span>${dt(o.warehouse_in_date)}</div>
        <div class="info-item"><span class="il">扣帳日期</span>${dt(o.deduction_date)}</div>
      </div>
    </div>
    <div class="info-group">
      <div class="info-group-title">收款資料</div>
      <div class="info-grid">
        <div class="info-item"><span class="il">KTS 貨款入帳日</span>${dt(o.kts_payment_date)}</div>
        <div class="info-item"><span class="il">TL 支付深南日期</span>${dt(o.tl_payment_date)}</div>
      </div>
    </div>
    <div class="info-group" style="margin-bottom:0">
      <div class="info-group-title">系統資訊</div>
      <div class="info-grid">
        <div class="info-item"><span class="il">建立時間</span><span class="iv">${o.created_at?new Date(o.created_at).toLocaleString('zh-TW'):'—'}</span></div>
        <div class="info-item"><span class="il">最後更新</span><span class="iv">${o.updated_at?new Date(o.updated_at).toLocaleString('zh-TW'):'—'}</span></div>
      </div>
    </div>`;
  g('modal').classList.add('open');
}
function closeModal(){g('modal').classList.remove('open');}
function closeModalBg(e){if(e.target===g('modal'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ── EXPORT EXCEL ──
function exportExcel(){
  if(!allOrders.length){toast('目前沒有資料可匯出','info');return;}
  const headers=['PO號碼','訂單金額USD','ETD','ETC發票日期','ETA','貨代清關日期',
    '報關費NTD','推貿費NTD','客戶簽收日期','對帳單日期','轉進貨單日期','入庫日期',
    '扣帳日期','KTS貨款入帳日','TL支付深南日期','狀態','建立時間'];
  const smap=['','已建立','已出貨','已進口','已結清'];
  const rows=allOrders.map(o=>[
    o.po_number||'',o.amount_usd||'',o.etd||'',o.etc_invoice_date||'',
    o.eta||'',o.customs_agent_date||'',o.customs_fee!=null?o.customs_fee:'',
    o.trade_promotion_fee!=null?o.trade_promotion_fee:'',
    o.customer_signed_date||'',o.monthly_statement_date||'',o.transfer_receipt_date||'',
    o.warehouse_in_date||'',o.deduction_date||'',o.kts_payment_date||'',
    o.tl_payment_date||'',smap[calcStage(o)]||'',
    o.created_at?new Date(o.created_at).toLocaleString('zh-TW'):''
  ]);
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=headers.map((_,i)=>({wch:i===0?20:14}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'訂單資料');
  const date=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`訂單管控_${date}.xlsx`);
  toast(`已匯出 ${allOrders.length} 筆訂單`,'ok');
}

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{
  const u=sessionStorage.getItem('u');
  if(u&&USERS[u]){
    CU=u;
    g('login-screen').style.display='none';
    g('app-screen').style.display='block';
    g('tb-user').textContent=u;
    loadOrders();
  }
});
</script>
