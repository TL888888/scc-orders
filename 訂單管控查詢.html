<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂單管控查詢</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#1e40af;--pri-l:#3b82f6;--pri-bg:#eff6ff;
  --ok:#16a34a;--ok-bg:#dcfce7;
  --err:#dc2626;--err-bg:#fee2e2;
  --warn:#d97706;--warn-bg:#fef3c7;
  --pur:#7c3aed;--pur-bg:#ede9fe;
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;
  --tx:#1e293b;--mu:#64748b
}
body{font-family:'Segoe UI','Microsoft JhengHei',Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 60%,#1e40af 100%)}
.login-box{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:400px;
  box-shadow:0 30px 60px rgba(0,0,0,.4);text-align:center}
.login-logo{font-size:2.5rem;margin-bottom:8px}
.login-box h2{font-size:1.4rem;font-weight:800;color:var(--pri);margin-bottom:4px}
.login-box p{color:var(--mu);font-size:.85rem;margin-bottom:32px}
.lf{margin-bottom:16px;text-align:left}
.lf label{display:block;font-size:.78rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.lf input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;font-family:inherit;transition:border-color .2s}
.lf input:focus{outline:none;border-color:var(--pri-l);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
#login-err{background:var(--err-bg);color:var(--err);border-radius:8px;padding:10px 14px;font-size:.85rem;font-weight:600;margin-bottom:16px;display:none}

/* APP */
#app-screen{display:none}
.topbar{background:var(--pri);color:#fff;height:58px;display:flex;align-items:center;
  justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 12px rgba(0,0,0,.25)}
.topbar-title{font-size:1.05rem;font-weight:800}
.topbar-right{display:flex;align-items:center;gap:10px}

/* FILTER BAR */
.filter-bar{background:#fff;border-bottom:1px solid var(--border);padding:14px 28px;
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;position:sticky;top:58px;z-index:100}
.filter-bar input[type=date],.filter-bar input[type=text]{
  padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;
  font-size:.875rem;transition:border-color .2s}
.filter-bar input:focus{outline:none;border-color:var(--pri-l)}
.filter-bar label{font-size:.8rem;color:var(--mu);font-weight:600;white-space:nowrap}
.filter-sep{color:var(--border);font-size:1.2rem}

/* MAIN */
.main{padding:24px 28px;max-width:1400px;margin:0 auto}

/* DASHBOARD CARDS */
.dash{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:28px}
.dcard{background:#fff;border-radius:14px;padding:20px;border:1px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.05);text-align:center}
.dcard .val{font-size:1.5rem;font-weight:800;margin-bottom:4px;line-height:1.2}
.dcard .lbl{font-size:.75rem;color:var(--mu);font-weight:600;line-height:1.4}
.dcard.c-blue .val{color:var(--pri)}
.dcard.c-green .val{color:var(--ok)}
.dcard.c-orange .val{color:var(--warn)}
.dcard.c-purple .val{color:var(--pur)}

/* TABLE */
.table-wrap{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.05)}
.table-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.table-hd-title{font-size:.95rem;font-weight:800;color:var(--tx)}
.tbl{width:100%;border-collapse:collapse;font-size:.85rem}
.tbl th{background:#f8fafc;padding:11px 14px;text-align:left;font-size:.75rem;font-weight:700;
  color:var(--mu);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);
  white-space:nowrap}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafafa}
.tbl-scroll{overflow-x:auto}

/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;white-space:nowrap}
.b1{background:#fef9c3;color:#854d0e}
.b2{background:#dbeafe;color:#1d4ed8}
.b3{background:#dcfce7;color:#15803d}
.b4{background:#ede9fe;color:#6d28d9}

/* BTNS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;
  border-radius:9px;font-size:.85rem;font-weight:700;cursor:pointer;border:2px solid transparent;
  font-family:inherit;transition:all .2s;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-pri{background:var(--pri);color:#fff;border-color:var(--pri)}
.btn-pri:hover:not(:disabled){background:#1e3a8a}
.btn-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.btn-ok:hover:not(:disabled){background:#15803d}
.btn-gh{background:#f1f5f9;color:var(--tx);border-color:#f1f5f9}
.btn-gh:hover:not(:disabled){background:#e2e8f0}
.btn-out{background:#fff;color:var(--pri);border-color:var(--pri)}
.btn-out:hover:not(:disabled){background:var(--pri-bg)}
.btn-sm{padding:6px 12px;font-size:.78rem}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:24px;display:none}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:780px;max-height:90vh;
  overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.modal-hd{padding:24px 28px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-hd h3{font-size:1.05rem;font-weight:800}
.modal-body{padding:24px 28px}
.info-group{margin-bottom:24px}
.info-group-title{font-size:.75rem;font-weight:700;color:var(--mu);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-grid.g3{grid-template-columns:1fr 1fr 1fr}
.info-item{display:flex;flex-direction:column;gap:4px}
.info-item .il{font-size:.73rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.4px}
.info-item .iv{font-size:.9rem;font-weight:600;color:var(--tx)}
.info-item .iv.empty{color:#cbd5e1}

/* TOAST */
#tc{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:360px}
.toast{padding:14px 18px;border-radius:12px;font-size:.875rem;font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,.15);animation:tin .3s ease}
@keyframes tin{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.t-ok{background:var(--ok-bg);color:var(--ok);border:1px solid #86efac}
.t-err{background:var(--err-bg);color:var(--err);border:1px solid #fca5a5}
.t-info{background:var(--pri-bg);color:var(--pri);border:1px solid #93c5fd}

/* SPINNER */
.sp{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty-state{padding:60px 20px;text-align:center;color:var(--mu)}
.empty-state .ei{font-size:2.5rem;margin-bottom:12px}
.empty-state p{font-size:.9rem}

/* SHIPMENTS SUB-TABLE IN MODAL */
.ship-table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:8px}
.ship-table th{text-align:left;padding:6px 10px;background:#f8fafc;border-bottom:1px solid var(--border);white-space:nowrap}
.ship-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.ship-table tr:last-child td{border-bottom:none}

@media(max-width:1100px){.dash{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){
  .dash{grid-template-columns:repeat(2,1fr)}
  .main,.filter-bar,.topbar{padding-left:16px;padding-right:16px}
  .info-grid,.info-grid.g3{grid-template-columns:1fr}
}
@media(max-width:480px){
  /* Login */
  .login-box{padding:32px 20px;margin:0 16px;width:calc(100% - 32px)}

  /* Topbar */
  .topbar{padding:0 12px;gap:6px}
  #tb-user{display:none}
  .topbar-right{gap:6px}

  /* Filter bar — allow vertical stacking */
  .filter-bar{padding:10px 12px;gap:6px}
  .filter-bar input[type=date]{flex:1;min-width:130px;font-size:16px}
  .filter-bar input[type=text]{width:auto!important;flex:1;font-size:16px}
  .filter-bar .btn{font-size:.8rem;padding:7px 10px}

  /* KPI cards — 2 cols, compact */
  .main{padding:12px}
  .dash{gap:8px;margin-bottom:18px}
  .dcard{padding:12px 8px}
  .dcard .val{font-size:1.1rem}
  .dcard .lbl{font-size:.68rem}

  /* Table — horizontal scroll with smooth iOS touch */
  .tbl-scroll{-webkit-overflow-scrolling:touch}
  .tbl{min-width:620px}

  /* Modal — slide up from bottom */
  .modal-bg{padding:0;align-items:flex-end}
  .modal{border-radius:16px 16px 0 0;max-height:88vh;width:100%}
  .modal-hd{padding:16px 18px}
  .modal-body{padding:16px 18px}

  /* Toast — full width */
  #tc{left:12px;right:12px;max-width:none;bottom:16px}

  /* Buttons — larger touch targets */
  .btn{min-height:44px}
  .btn-sm{min-height:40px;padding:8px 12px}
}

  /* 隱藏瀏覽器內建密碼眼睛 */
  input[type=password]::-ms-reveal,
  input[type=password]::-ms-clear,
  input[type=password]::-webkit-credentials-auto-fill-button { display:none !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">📊</div>
    <h2>訂單管控查詢</h2>
    <p>請輸入帳號與密碼以登入</p>
    <div id="login-err">帳號或密碼錯誤，請重試</div>
    <div class="lf"><label>Email</label><input type="email" id="un" placeholder="your@email.com" autocomplete="username"></div>
    <div class="lf">
      <label>密碼</label>
      <div style="position:relative;">
        <input type="password" id="pw" placeholder="密碼" autocomplete="current-password" style="padding-right:44px;">
        
      </div>
    </div>

<div id="monkey-toggle" style="display:flex;flex-direction:column;align-items:center;margin-top:8px;">
  <button type="button" onclick="toggleMonkey()" style="background:none;border:none;cursor:pointer;padding:4px;transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'">
    <svg id="monkey-svg" width="56" height="64" viewBox="0 0 72 80">
      <circle cx="9" cy="36" r="9" fill="#c8853a"/>
      <circle cx="9" cy="36" r="5.5" fill="#e8a96a"/>
      <circle cx="63" cy="36" r="9" fill="#c8853a"/>
      <circle cx="63" cy="36" r="5.5" fill="#e8a96a"/>
      <ellipse cx="36" cy="62" rx="16" ry="14" fill="#c8853a"/>
      <ellipse cx="36" cy="64" rx="9" ry="9" fill="#e8a96a"/>
      <ellipse cx="36" cy="28" rx="21" ry="21" fill="#c8853a"/>
      <ellipse cx="36" cy="32" rx="14" ry="11" fill="#e8a96a"/>
      <ellipse cx="36" cy="35" rx="4.5" ry="3.5" fill="#b06828"/>
      <circle cx="34" cy="35" r="1.4" fill="#7a3f10"/>
      <circle cx="38" cy="35" r="1.4" fill="#7a3f10"/>
      <path id="mk-mouth-n" d="M30 40 Q36 43 42 40" stroke="#7a3f10" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path id="mk-mouth-s" d="M30 40 Q36 46 42 40" stroke="#7a3f10" stroke-width="1.8" fill="none" stroke-linecap="round" style="display:none"/>
      <g id="mk-eyes" style="display:none">
        <circle cx="26" cy="26" r="5.5" fill="white"/>
        <circle cx="46" cy="26" r="5.5" fill="white"/>
        <circle cx="26" cy="27" r="3.2" fill="#3a2010"/>
        <circle cx="46" cy="27" r="3.2" fill="#3a2010"/>
        <circle cx="27" cy="26" r="1.2" fill="white"/>
        <circle cx="47" cy="26" r="1.2" fill="white"/>
      </g>
      <g id="mk-hands">
        <ellipse cx="18" cy="24" rx="9" ry="7" fill="#c8853a" transform="rotate(-20,18,24)"/>
        <circle cx="11" cy="20" r="4" fill="#c8853a"/>
        <circle cx="15" cy="18" r="4" fill="#c8853a"/>
        <circle cx="19" cy="17" r="4" fill="#c8853a"/>
        <circle cx="23" cy="19" r="4" fill="#c8853a"/>
        <ellipse cx="54" cy="24" rx="9" ry="7" fill="#c8853a" transform="rotate(20,54,24)"/>
        <circle cx="61" cy="20" r="4" fill="#c8853a"/>
        <circle cx="57" cy="18" r="4" fill="#c8853a"/>
        <circle cx="53" cy="17" r="4" fill="#c8853a"/>
        <circle cx="49" cy="19" r="4" fill="#c8853a"/>
      </g>
      <g id="mk-banana" style="display:none">
        <path d="M50 56 Q64 48 66 36" stroke="#c8853a" stroke-width="8" fill="none" stroke-linecap="round"/>
        <path d="M60 16 Q75 22 72 38 Q70 46 64 43 Q52 38 55 22 Q57 14 60 16Z" fill="#f5d020"/>
        <path d="M60 16 Q58 11 61 10" stroke="#8b6914" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M72 38 Q76 43 74 46" stroke="#8b6914" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M62 18 Q73 24 70 36" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </g>
    </svg>
  </button>
  <div id="mk-label" style="font-size:11px;color:#64748b;margin-top:2px;">點我顯示密碼</div>
</div>
<script>
var _mkShowing=false;
function toggleMonkey(){
  _mkShowing=!_mkShowing;
  var pwInputs=document.querySelectorAll('input[type=password],input[type=text][id*="pw"],input[type=text][id*="password"],input[type=text][id*="passwordInput"]');
  pwInputs.forEach(function(el){if(el.id==='passwordInput'||el.id==='pw')el.type=_mkShowing?'text':'password';});
  document.getElementById('mk-hands').style.display=_mkShowing?'none':'';
  document.getElementById('mk-eyes').style.display=_mkShowing?'':'none';
  document.getElementById('mk-banana').style.display=_mkShowing?'':'none';
  document.getElementById('mk-mouth-s').style.display=_mkShowing?'':'none';
  document.getElementById('mk-mouth-n').style.display=_mkShowing?'none':'';
  document.getElementById('mk-label').textContent=_mkShowing?'點我隱藏密碼':'點我顯示密碼';
}
</script>
    <button class="btn btn-pri" style="width:100%;margin-top:8px" onclick="doLogin()" id="login-btn">登入</button>
  </div>
</div>

<!-- 修改密碼 Modal -->
<div id="change-pw-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:#fff;border-radius:16px;padding:28px;max-width:400px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.3);">
    <div style="font-size:1rem;font-weight:800;margin-bottom:20px;">🔑 修改密碼</div>
    <div class="lf">
      <label>新密碼</label>
      <div style="position:relative;">
        <input type="password" id="new-pw-input" placeholder="輸入新密碼" style="padding-right:44px;">
        <button type="button" onclick="togglePw('new-pw-input','eye-new')" id="eye-new" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:#64748b;">👁</button>
      </div>
    </div>
    <div class="lf">
      <label>確認新密碼</label>
      <div style="position:relative;">
        <input type="password" id="confirm-pw-input" placeholder="再次輸入新密碼" style="padding-right:44px;">
        <button type="button" onclick="togglePw('confirm-pw-input','eye-confirm')" id="eye-confirm" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:#64748b;">👁</button>
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
      <button class="btn btn-gh btn-sm" onclick="closeChangePwModal()">取消</button>
      <button class="btn btn-ok btn-sm" onclick="doChangePw()" id="change-pw-btn">💾 儲存</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-title">📊 訂單管控查詢</div>
    <div class="topbar-right">
      <span id="tb-user" style="opacity:.85;font-size:.85rem"></span>
      <a href="%E8%A8%82%E5%96%AE%E7%99%BB%E6%89%93.html"
        style="color:#fff;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:8px;text-decoration:none;font-size:.85rem">📋 登打</a>
      <button class="btn btn-sm btn-ok" onclick="exportExcel()">📥 匯出 Excel</button>
      <button class="btn btn-sm" onclick="openChangePwModal()" style="color:#fff;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:8px">🔑 改密碼</button>
      <button class="btn btn-sm" onclick="doLogout()"
        style="color:#fff;background:rgba(255,255,255,.15);border:none;padding:6px 14px;border-radius:8px">登出</button>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">
    <label>ETA 區間</label>
    <input type="date" id="f-from" onchange="loadOrders()">
    <span class="filter-sep">—</span>
    <input type="date" id="f-to" onchange="loadOrders()">
    <label style="margin-left:8px">PO 搜尋</label>
    <input type="text" id="f-po" placeholder="模糊搜尋 PO 號碼..." style="width:200px" oninput="debounceLoad()">
    <button class="btn btn-gh btn-sm" onclick="clearFilter()">清除篩選</button>
    <span id="filter-count" style="font-size:.8rem;color:var(--mu)"></span>
  </div>

  <div class="main">
    <!-- DASHBOARD -->
    <div class="dash">
      <div class="dcard c-blue">
        <div class="val" id="kpi-total">—</div>
        <div class="lbl">累計訂單筆數</div>
      </div>
      <div class="dcard c-green">
        <div class="val" id="kpi-imported">—</div>
        <div class="lbl">已進口筆數</div>
      </div>
      <div class="dcard c-blue">
        <div class="val" id="kpi-amt">—</div>
        <div class="lbl">累計訂單金額<br>USD</div>
      </div>
      <div class="dcard c-green">
        <div class="val" id="kpi-iamt">—</div>
        <div class="lbl">已進口總金額<br>USD</div>
      </div>
      <div class="dcard c-orange">
        <div class="val" id="kpi-comm">—</div>
        <div class="lbl">累計佣金<br>NTD</div>
      </div>
      <div class="dcard c-purple">
        <div class="val" id="kpi-fee">—</div>
        <div class="lbl">累計進口費用<br>NTD</div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-hd">
        <div class="table-hd-title">訂單列表</div>
      </div>
      <div class="tbl-scroll">
        <table class="tbl">
          <thead>
            <tr>
              <th>PO 號碼</th>
              <th>訂單金額 USD</th>
              <th>ETA</th>
              <th>已出數量</th>
              <th>未出數量</th>
              <th>報關費 NTD</th>
              <th>推貿費 NTD</th>
              <th>3% 佣金 NTD</th>
              <th>KTS 入帳日</th>
              <th>TL 付款日</th>
              <th>狀態</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbl-body">
            <tr><td colspan="12" style="text-align:center;padding:40px;color:var(--mu)">載入中...</td></tr>
          </tbody>
        </table>
      </div>
      <div id="pagination" style="display:none;padding:14px 0;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap"></div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="modal" onclick="closeModalBg(event)">

// ── LOAD ──
async function loadOrders(){
  page=1;
  const from=g('f-from').value,to=g('f-to').value,po=g('f-po').value.trim();

  // 1. If ETA date filter set, find matching order_ids via shipments.eta first
  let filterIds=null;
  if(from||to){
    let sq=db.from('shipments').select('order_id');
    if(from) sq=sq.gte('eta',from);
    if(to) sq=sq.lte('eta',to);
    const {data:matchShips}=await sq;
    if(!matchShips||!matchShips.length){allOrders=[];renderDash();renderTable();return;}
    filterIds=[...new Set(matchShips.map(s=>s.order_id))];
  }

  // 2. Load orders
  let q=db.from('orders')
    .select('id,po_number,order_date,etd,order_qty,unit_price,amount_usd,stage,kts_payment_date,kts_payment_amount_usd,tl_payment_date,created_at,updated_at')
    .order('created_at',{ascending:false});
  if(filterIds) q=q.in('id',filterIds);
  if(po) q=q.ilike('po_number',`%${po}%`);
  const {data:orders,error:oe}=await q;
  if(oe){toast('載入失敗：'+oe.message,'err');return;}

  // 3. Load all shipments for these orders
  const ids=(orders||[]).map(o=>o.id);
  let ships=[];
  if(ids.length){
    const {data:s}=await db.from('shipments')
      .select('id,order_id,shipping_notice_no,eta,actual_qty,actual_amount_usd,customs_fee,trade_promotion_fee,kts_payment_date,tl_payment_date')
      .in('order_id',ids);
    ships=s||[];
  }

  // 4. Aggregate per order in JS
  allOrders=(orders||[]).map(o=>{
    const myShips=ships.filter(s=>s.order_id===o.id);
    const latestEta=myShips.reduce((max,s)=>(!max||(s.eta&&s.eta>max))?s.eta:max,null);
    const totalShipped=myShips.reduce((sum,s)=>sum+(s.actual_qty||0),0);
    const unshipped=Math.max(0,(o.order_qty||0)-totalShipped);
    const customsFeeSum=myShips.reduce((sum,s)=>sum+(s.customs_fee||0),0);
    const tradeFeeSum=myShips.reduce((sum,s)=>sum+(s.trade_promotion_fee||0),0);
    const shipAmtSum=myShips.reduce((sum,s)=>sum+(parseFloat(s.actual_amount_usd)||0),0);
    const commission=shipAmtSum*30*0.03;
    return {...o,shipments:myShips,latest_eta:latestEta,
      total_shipped:totalShipped,unshipped,
      customs_fee_sum:customsFeeSum,trade_fee_sum:tradeFeeSum,
      ship_amount:shipAmtSum,commission};
  });
  // 依狀態排序(1→4)，同狀態內依建立時間新到舊
  allOrders.sort((a,b)=>a.stage-b.stage||(b.created_at>a.created_at?1:-1));
  renderDash();
  renderTable();
}
function debounceLoad(){page=1;clearTimeout(ldTimer);ldTimer=setTimeout(loadOrders,350);}

}

// ── DASHBOARD ──
function renderDash(){
  const total=allOrders.length;
  const imported=allOrders.filter(o=>o.total_shipped>0||o.latest_eta).length;
  const amt=allOrders.reduce((s,o)=>s+(+o.amount_usd||0),0);
  const iamt=allOrders.reduce((s,o)=>s+(+o.ship_amount||0),0);
  const comm=allOrders.reduce((s,o)=>s+(+o.commission||0),0);
  const fee=allOrders.reduce((s,o)=>s+(+o.customs_fee_sum||0)+(+o.trade_fee_sum||0),0);
  g('kpi-total').textContent=total.toLocaleString();
  g('kpi-imported').textContent=imported.toLocaleString();
  g('kpi-amt').textContent=fmtN(amt,0);
  g('kpi-iamt').textContent=fmtN(iamt,0);
  g('kpi-comm').textContent=fmtNI(comm);
  g('kpi-fee').textContent=fmtNI(fee);
  g('filter-count').textContent=`共 ${total} 筆`;
}

// ── TABLE ──
const SL=['','已建立','已出貨','已進口','已結清'];
function renderTable(){
  const body=g('tbl-body');
  const total=allOrders.length;
  if(!total){
    body.innerHTML='<tr><td colspan="12"><div class="empty-state"><div class="ei">📭</div><p>目前沒有符合條件的訂單</p></div></td></tr>';
    g('pagination').style.display='none';
    return;
  }
  const totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(page>totalPages) page=totalPages;
  const pageList=allOrders.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  body.innerHTML=pageList.map(o=>{
    const st=o.stage||1;
    return`<tr>
      <td><strong>${o.po_number||'—'}</strong></td>
      <td>${o.amount_usd?'$'+fmtN(o.amount_usd):'—'}</td>
      <td>${fmtD(o.latest_eta)}</td>
      <td>${o.total_shipped>0?Number(o.total_shipped).toLocaleString('zh-TW'):'—'}</td>
      <td>${o.unshipped>0?Number(o.unshipped).toLocaleString('zh-TW'):'0'}</td>
      <td>${o.customs_fee_sum>0?fmtNI(o.customs_fee_sum):'—'}</td>
      <td>${o.trade_fee_sum>0?fmtNI(o.trade_fee_sum):'—'}</td>
      <td>${o.commission>0?fmtNI(o.commission):'—'}</td>
      <td>${fmtD(o.kts_payment_date)}</td>
      <td>${fmtD(o.tl_payment_date)}</td>
      <td><span class="bdg b${st}">${SL[st]||''}</span></td>
      <td><button class="btn btn-out btn-sm" onclick="openDetail(${o.id})">詳情</button></td>
    </tr>`;
  }).join('');
  // 分頁控制列
  const pg=g('pagination');
  if(totalPages<=1){pg.style.display='none';}
  else{
    pg.style.display='flex';
    const prev=page>1?`<button class="btn btn-sm btn-gh" onclick="setPage(${page-1})">← 上一頁</button>`:`<button class="btn btn-sm btn-gh" disabled style="opacity:.4">← 上一頁</button>`;
    const next=page<totalPages?`<button class="btn btn-sm btn-gh" onclick="setPage(${page+1})">下一頁 →</button>`:`<button class="btn btn-sm btn-gh" disabled style="opacity:.4">下一頁 →</button>`;
    pg.innerHTML=`${prev}<span style="font-size:.83rem;color:var(--mu);padding:0 4px">第 ${page} 頁 / 共 ${totalPages} 頁（${total} 筆）</span>${next}`;
  }
}
function setPage(n){page=n;renderTable();}

              <td style="text-align:right">${s.customs_fee!=null?fmtNI(s.customs_fee):'—'}</td>

  } else {

// ── EXPORT EXCEL ──
function exportExcel(){
  if(!allOrders.length){toast('目前沒有資料可匯出','info');return;}
  const headers=['PO號碼','訂單金額USD','ETD','ETA','已出數量','未出數量',
    '報關費NTD','推貿費NTD','3%佣金NTD','KTS入帳日','TL付款日','狀態','建立時間'];
  const smap=['','已建立','已出貨','已進口','已結清'];
  const rows=allOrders.map(o=>[
    o.po_number||'',o.amount_usd||'',o.etd||'',o.latest_eta||'',
    o.total_shipped||0,o.unshipped||0,
    o.customs_fee_sum||0,o.trade_fee_sum||0,
    Math.round(o.commission||0),
    o.kts_payment_date||'',o.tl_payment_date||'',
    smap[o.stage||1]||'',
    o.created_at?new Date(o.created_at).toLocaleString('zh-TW'):''
  ]);
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=headers.map((_,i)=>({wch:i===0?20:14}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'訂單資料');
  const date=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`訂單管控_${date}.xlsx`);
  toast(`已匯出 ${allOrders.length} 筆訂單`,'ok');
}
